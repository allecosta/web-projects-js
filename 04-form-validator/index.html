<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="assets/css/style.css" />
    <title>Form Validator</title>
  </head>
  <body>
    <div class="container">
      <form id="form" class="form">
        <h2>Registre-se</h2>
        
        <div class="form-control">
            <label>
                Nome <input type="text" id="username" placeholder="Insira seu nome" />
            </label>
          <small></small>
        </div>
        
        <div class="form-control">
            <label>
                Email <input type="text" id="email" placeholder="Insira seu email" />
            </label>
            <small></small>
        </div>
        
        <div class="form-control">
            <label>
                Senha <input type="password" id="password" placeholder="Insira sua senha" />
            </label>
            <small></small>
        </div>

        <div class="form-control">
            <label>
                Confirmar senha <input type="password" id="password2" placeholder="Confirme sua senha"/>
            </label>
            <small></small>
        </div>

        <button type="submit">Enviar</button>
      </form>
    </div>

    <script src="assets/js/script.js"></script>
  </body>
</html>
